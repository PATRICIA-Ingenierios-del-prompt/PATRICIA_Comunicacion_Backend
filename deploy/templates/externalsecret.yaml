# Trae lo que Communication necesita desde AWS Secrets Manager a un Secret
# nativo de k8s (communication-secrets) que el Deployment monta via envFrom.
#
# amazon-mq expone SPRING_RABBITMQ_ADDRESSES (URI amqps://...:5671 completa),
# y application.properties ya usa spring.rabbitmq.addresses -- coincide 1:1.
#
# cache-redis (REDIS_HOST/PORT/PASSWORD) coincide con
# spring.data.redis.* de application.properties.
#
# backplane-redis (BACKPLANE_REDIS_HOST/PORT/PASSWORD) coincide con
# backplane.redis.* de application.properties.
#
# communication/postgres (Neon serverless) expone SPRING_DATASOURCE_URL/
# USERNAME/PASSWORD -- coincide con spring.datasource.* tras la migracion
# de DB_URL/USERNAME/PASSWORD a SPRING_DATASOURCE_* en application.properties.
#
# jwt-secret: MISMO secreto (HS256) que usan Auth (lo firma) y Gateway
# (lo valida) -- ver gateway/deploy/templates/externalsecret.yaml, que lee
# de esta misma remoteRef. Sin esta entrada, JWT_SECRET nunca llega al pod
# y application.properties cae al default hardcodeado
# ("patricia2025secretkeyparahmac256"), asi que Comunicacion firma/valida
# con una clave distinta a la real y rechaza CUALQUIER token valido con 401
# -- el pod arranca sin error porque el default lo enmascara en silencio.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: communication-secrets
  namespace: patricia-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.clusterSecretStore }}
    kind: ClusterSecretStore
  target:
    name: communication-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/jwt-secret" }
    - secretKey: SPRING_RABBITMQ_ADDRESSES
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_ADDRESSES }
    - secretKey: SPRING_RABBITMQ_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_USERNAME }
    - secretKey: SPRING_RABBITMQ_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/amazon-mq", property: SPRING_RABBITMQ_PASSWORD }
    - secretKey: REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_HOST }
    - secretKey: REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PORT }
    - secretKey: REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/cache-redis", property: REDIS_PASSWORD }
    - secretKey: BACKPLANE_REDIS_HOST
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_HOST }
    - secretKey: BACKPLANE_REDIS_PORT
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PORT }
    - secretKey: BACKPLANE_REDIS_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/backplane-redis", property: BACKPLANE_REDIS_PASSWORD }
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/communication/postgres", property: SPRING_DATASOURCE_URL }
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/communication/postgres", property: SPRING_DATASOURCE_USERNAME }
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef: { key: "{{ .Values.externalSecrets.prefix }}/communication/postgres", property: SPRING_DATASOURCE_PASSWORD }
