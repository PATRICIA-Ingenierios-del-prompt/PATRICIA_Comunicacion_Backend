spring.application.name=comunicacion

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/comunicacion_rt}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

jwt.secret=patricia2025secretkeyparahmac256

# Puerto real de Parches Core (antes apuntaba a :8082, que nunca existió)
services.parches-core.url=${PARCHES_CORE_URL:http://localhost:8083}

management.endpoints.web.exposure.include=health
server.port=${SERVER_PORT:8084}

backplane.enabled=${BACKPLANE_ENABLED:true}
backplane.channel=${BACKPLANE_CHANNEL:patricia:backplane:communication}
backplane.redis.host=${BACKPLANE_REDIS_HOST:localhost}
backplane.redis.port=${BACKPLANE_REDIS_PORT:6380}
backplane.redis.password=${BACKPLANE_REDIS_PASSWORD:}