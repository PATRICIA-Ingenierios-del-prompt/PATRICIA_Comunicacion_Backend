spring.application.name=comunicacion

# Neon (Postgres serverless externo). El secreto en Secrets Manager
# (patricia-dev/communication/postgres) publica estas 3 keys exactas via
# el ExternalSecret del chart -- no renombrar.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/comunicacion_rt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=true

# Redis de cache (Cluster #1). SSL en el cliente lo activa BackplaneConfig.
# Default true porque ElastiCache tiene transit_encryption hardcoded en
# Ulink_Infra; override a false solo para docker-compose/CI local (redis:7-alpine
# sin TLS) -- ver REDIS_SSL_ENABLED en docker-compose.yml y CI.yml.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}

# Amazon MQ (RabbitMQ). El secreto expone una URI amqps://...:5671 completa
# (TLS), no host+port separados -- por eso usamos spring.rabbitmq.addresses,
# no spring.rabbitmq.host/port. Mismo patron que Parches/Location/Auth/Users.
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Mismo secreto (HS256) que jwt.secret en Auth y Gateway -- ver
# gateway/deploy/templates/externalsecret.yaml y comunicacion/deploy/templates/
# externalsecret.yaml (ambos leen "{{ prefix }}/jwt-secret"). Sin default:
# si ExternalSecret/docker-compose no la proveen, el arranque falla ruidoso
# en vez de caer en una clave placeholder que hace que TODO token valido
# se rechace con 401 en silencio (bug real que costo horas de debug).
jwt.secret=${JWT_SECRET}

services.parches-core.url=${PARCHES_CORE_URL:http://parche-core:8083}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
server.port=${SERVER_PORT:8084}

# Backplane (Redis Cluster #2, pub/sub). Default false: el ConfigMap del chart
# lo pone a true en K8s. Local docker-compose sigue funcionando con false.
backplane.enabled=${BACKPLANE_ENABLED:false}
backplane.channel=${BACKPLANE_CHANNEL:patricia:backplane:communication}
backplane.redis.host=${BACKPLANE_REDIS_HOST:localhost}
backplane.redis.port=${BACKPLANE_REDIS_PORT:6379}
backplane.redis.password=${BACKPLANE_REDIS_PASSWORD:}
backplane.redis.ssl-enabled=${BACKPLANE_REDIS_SSL_ENABLED:true}
