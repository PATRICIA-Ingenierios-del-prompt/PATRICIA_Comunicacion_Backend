spring.application.name=comunicacion-test

# H2 en memoria para tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Deshabilitar Flyway en tests (H2 no tiene gen_random_uuid)
spring.flyway.enabled=false

# Deshabilitar Redis y Kafka en tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.kafka.annotation.KafkaListenerAnnotationBeanPostProcessor

# JWT
jwt.secret=test-secret-key-for-unit-tests-only-32chars!
services.parches-core.url=http://localhost:9999
kafka.topics.chat-pendiente=chat.pendiente
kafka.topics.miembro-expulsado=miembro.expulsado

logging.level.com.patricia=DEBUG
logging.level.org.springframework=INFO
