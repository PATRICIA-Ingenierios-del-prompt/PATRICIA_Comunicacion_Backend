name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # RabbitMQ and Redis are needed for integration tests.
    # Postgres is managed by Testcontainers (Docker daemon on ubuntu-latest).
    services:
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Compiles, runs unit tests (Surefire, *Test) + integration tests (Failsafe, *IT),
      # enforces the 80% coverage gate (-Pcoverage) and packages the jar.
      - name: Build, test & coverage
        run: mvn -B clean verify -Pcoverage
        env:
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_PORT: 5672
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379

      # -------------------------------------------------------------------------
      # SonarCloud quality gate. Enable once the SonarCloud project + secrets
      # are configured. A failing quality gate blocks the PR into develop.
      # -------------------------------------------------------------------------
      - name: Sonar analysis (branch)
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/ComunicacionApplication.java" \
            -Dsonar.coverage.exclusions="**/ComunicacionApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**,**/backplane/**"

      - name: Sonar analysis (pull request)
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_BACKEND }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn --batch-mode sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY_BACKEND }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN_BACKEND }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=${GITHUB_WORKSPACE}/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions="**/ComunicacionApplication.java" \
            -Dsonar.coverage.exclusions="**/ComunicacionApplication.java,**/dto/**,**/*Entity.java,**/*Mapper.java,**/config/**,**/backplane/**" \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      - name: Build Docker image (verify Dockerfile works)
        run: docker build -t patricia-comunicacion:ci .
